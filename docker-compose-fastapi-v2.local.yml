services:
  fastapi:
    image: choihorim/flowify-fastapi:latest
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-flowify}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4o}
      LLM_API_KEY: ${LLM_API_KEY:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      NOTION_INTEGRATION_TOKEN: ${NOTION_INTEGRATION_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CANVAS_API_URL: ${CANVAS_API_URL:-https://canvas.kumoh.ac.kr}
      CANVAS_TOKEN: ${CANVAS_TOKEN:-}
